<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://pzzunxgbzkhdqemmgavd.supabase.co" crossorigin/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>결제 실패 · Wellypet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style> *{box-sizing:border-box;margin:0;padding:0;} :root{--pk:#c45c8a;--pkm:#e07aaa;--pkl:#f2aecb;--pkp:#fce8f2;--pkbg:#fff5f9;--bd:#f0d8e6;--tx:#2a1a22;--muted:#a08090;} body{font-family:'Noto Sans KR',sans-serif;background:#f8f8f8;color:var(--tx);min-height:100vh;display:flex;flex-direction:column;} header{background:#fff;border-bottom:1px solid var(--bd);padding:0 40px;height:60px;display:flex;align-items:center;} .logo{font-size:22px;font-weight:800;color:var(--pk);text-decoration:none;} .logo em{font-style:normal;color:var(--pkm);} .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;} .card{background:#fff;border-radius:24px;padding:48px 40px;max-width:480px;width:100%;border:1px solid var(--bd);text-align:center;} .fail-icon{width:80px;height:80px;background:#fff0f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;} .card h1{font-size:24px;font-weight:800;color:var(--tx);margin-bottom:8px;} .card p{font-size:14px;color:var(--muted);font-weight:300;line-height:1.7;margin-bottom:28px;} .error-box{background:#fff8f8;border:1px solid #ffd0d0;border-radius:14px;padding:20px;margin-bottom:24px;text-align:left;} .error-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;} .error-row:last-child{margin-bottom:0;} .error-row .k{font-size:12px;color:var(--muted);} .error-row .v{font-size:13px;font-weight:600;color:var(--tx);} .error-row .v.red{color:#e05050;} .help-box{background:var(--pkbg);border-radius:12px;padding:14px 16px;margin-bottom:24px;text-align:left;} .help-box h4{font-size:13px;font-weight:700;color:var(--pk);margin-bottom:8px;} .help-box ul{padding-left:16px;} .help-box ul li{font-size:12px;color:var(--muted);font-weight:300;margin-bottom:4px;line-height:1.6;} .btns{display:flex;gap:10px;} .btn-main{flex:1;background:var(--pk);color:#fff;border:none;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:none;display:block;transition:background .2s;} .btn-main:hover{background:#b04a7a;} .btn-sub{flex:1;background:transparent;color:var(--pk);border:1.5px solid var(--pk);padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:none;display:block;} </style>
</head>
<body>
<header>
  <a class="logo" href="index.html">Welly<em>pet</em></a>
</header>
<div class="wrap">
  <div class="card">
    <div class="fail-icon">😢</div>
    <h1>결제에 실패했어요</h1>
    <p>결제 중 문제가 발생했어요.<br>아래 내용을 확인하고 다시 시도해주세요.</p>
    <div class="error-box">
      <div class="error-row"><span class="k">오류 코드</span><span class="v red" id="errorCode">-</span></div>
      <div class="error-row"><span class="k">오류 내용</span><span class="v" id="errorMsg">-</span></div>
      <div class="error-row"><span class="k">주문 번호</span><span class="v" id="orderId">-</span></div>
    </div>
    <div class="help-box">
      <h4>이런 경우 확인해보세요</h4>
      <ul>
        <li>카드 한도 또는 잔액이 부족한 경우</li>
        <li>카드 정보가 잘못 입력된 경우</li>
        <li>결제 도중 창을 닫은 경우</li>
        <li>네트워크 연결이 불안정한 경우</li>
      </ul>
    </div>
    <div class="btns">
      <a class="btn-sub" href="index.html">홈으로 가기</a>
      <a class="btn-main" href="checkout.html">다시 결제하기</a>
    </div>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const errorCode = params.get('code');
const errorMsg = params.get('message');
const orderId = params.get('orderId');

if(errorCode) document.getElementById('errorCode').textContent = errorCode;
if(errorMsg) document.getElementById('errorMsg').textContent = errorMsg;
if(orderId) document.getElementById('orderId').textContent = orderId;
</script>
</body>
</html>
