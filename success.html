<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>결제 완료 · Wellypet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pk:#c45c8a;--pkm:#e07aaa;--pkl:#f2aecb;--pkp:#fce8f2;--pkbg:#fff5f9;--bd:#f0d8e6;--tx:#2a1a22;--muted:#a08090;}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f8f8;color:var(--tx);display:flex;align-items:center;justify-content:center;min-height:100vh;}
.wrap{background:#fff;border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;border:1px solid var(--bd);}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:#2a1220;margin-bottom:8px;}
p{font-size:14px;color:var(--muted);font-weight:300;margin-bottom:28px;line-height:1.7;}
.order-info{background:var(--pkbg);border-radius:12px;padding:20px;margin-bottom:28px;text-align:left;}
.order-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;}
.order-row:last-child{margin-bottom:0;}
.order-row .k{color:var(--muted);font-weight:300;}
.order-row .v{color:var(--tx);font-weight:500;}
.donation-box{background:var(--pk);border-radius:12px;padding:16px;margin-bottom:28px;color:#fff;font-size:13px;font-weight:300;}
.donation-box strong{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;}
.btn-home{background:var(--pk);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-right:10px;}
.btn-shop{background:#fff;color:var(--pk);border:1.5px solid var(--pk);padding:14px 36px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🎉</div>
  <h1>결제가 완료됐어요!</h1>
  <p>주문해주셔서 감사해요 🐾<br>빠르게 준비해서 보내드릴게요!</p>
  <div class="order-info" id="orderInfo">
    <div class="order-row"><span class="k">주문번호</span><span class="v" id="orderId">-</span></div>
    <div class="order-row"><span class="k">상품명</span><span class="v" id="orderName">-</span></div>
    <div class="order-row"><span class="k">결제금액</span><span class="v" id="orderAmount">-</span></div>
    <div class="order-row"><span class="k">배송지</span><span class="v" id="orderAddress">-</span></div>
  </div>
  <div class="donation-box">
    🏠 이번 주문으로 <strong id="donationAmt">0원</strong>이<br>유기견 보호소에 기부됐어요!
  </div>
  <button class="btn-home" onclick="location.href='/'">홈으로</button>
  <button class="btn-shop" onclick="location.href='shop.html'">계속 쇼핑하기</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://pzzunxgbzkhdqemmgavd.supabase.co';
const SUPABASE_KEY='sb_publishable_1LOWmRTjPF-UKiW6tVHA1w_aDqsrWea';
const _supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function init(){
  const params=new URLSearchParams(window.location.search);
  const orderId=params.get('orderId')||'';
  const amount=params.get('amount')||'0';

  document.getElementById('orderId').textContent=orderId;
  document.getElementById('orderAmount').textContent=Number(amount).toLocaleString()+'원';

  // localStorage에서 주문 정보 가져오기
  const pending=JSON.parse(localStorage.getItem('pendingOrder')||'{}');

  if(pending.items){
    document.getElementById('orderName').textContent=pending.items.length===1?pending.items[0].name:`${pending.items[0].name} 외 ${pending.items.length-1}건`;
    document.getElementById('orderAddress').textContent=(pending.address||'')+' '+(pending.addressDetail||'');

    // 기부금 계산
    const totalDon=pending.items.reduce((sum,item)=>(sum+(item.donation_amount||0)*(item.qty||1)),0);
    document.getElementById('donationAmt').textContent=Number(totalDon).toLocaleString()+'원';

    // Supabase에 주문 저장
    for(const item of pending.items){
      await _supabase.from('orders').insert({
        customer_name: pending.name,
        customer_email: pending.email,
        customer_phone: pending.phone,
        zipcode: pending.zipcode,
        address: pending.address,
        address_detail: pending.addressDetail,
        product_name: item.name,
        amount: item.price*(item.qty||1),
        status: '결제완료',
      });
    }

    // 장바구니 & 임시 주문 정보 삭제
    localStorage.removeItem('cart');
    localStorage.removeItem('pendingOrder');
  }
}

init();
</script>
</body>
</html>
