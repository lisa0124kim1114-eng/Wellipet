<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>кІ°м ң мҷ„лЈҢ В· Wellypet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="common.css"/>
<style> *{box-sizing:border-box;margin:0;padding:0;} :root{--pk:#c45c8a;--pkm:#e07aaa;--pkl:#f2aecb;--pkp:#fce8f2;--pkbg:#fff5f9;--bd:#f0d8e6;--tx:#2a1a22;--muted:#a08090;} body{font-family:'Noto Sans KR',sans-serif;background:#f8f8f8;color:var(--tx);display:flex;align-items:center;justify-content:center;min-height:100vh;} .wrap{background:#fff;border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;border:1px solid var(--bd);} .icon{font-size:64px;margin-bottom:20px;} h1{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:#2a1220;margin-bottom:8px;} p{font-size:14px;color:var(--muted);font-weight:300;margin-bottom:28px;line-height:1.7;} .order-info{background:var(--pkbg);border-radius:12px;padding:20px;margin-bottom:28px;text-align:left;} .order-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;} .order-row:last-child{margin-bottom:0;} .order-row .k{color:var(--muted);font-weight:300;} .order-row .v{color:var(--tx);font-weight:500;} .donation-box{background:var(--pk);border-radius:12px;padding:16px;margin-bottom:28px;color:#fff;font-size:13px;font-weight:300;} .donation-box strong{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;} .btn-home{background:var(--pk);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-right:10px;} .btn-shop{background:#fff;color:var(--pk);border:1.5px solid var(--pk);padding:14px 36px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;} </style>
</head>
<body>
<div class="wrap">
  <div class="icon">рҹҺү</div>
  <h1>кІ°м ңк°Җ мҷ„лЈҢлҗҗм–ҙмҡ”!</h1>
  <p>мЈјл¬ён•ҙмЈјм…”м„ң к°җмӮ¬н•ҙмҡ” рҹҗҫ<br>л№ лҘҙкІҢ мӨҖл№„н•ҙм„ң ліҙлӮҙл“ңлҰҙкІҢмҡ”!</p>
  <div class="order-info" id="orderInfo">
    <div class="order-row"><span class="k">мЈјл¬ёлІҲнҳё</span><span class="v" id="orderId">-</span></div>
    <div class="order-row"><span class="k">мғҒн’ҲлӘ…</span><span class="v" id="orderName">-</span></div>
    <div class="order-row"><span class="k">кІ°м ңкёҲм•Ў</span><span class="v" id="orderAmount">-</span></div>
    <div class="order-row"><span class="k">л°°мҶЎм§Җ</span><span class="v" id="orderAddress">-</span></div>
  </div>
  <div class="donation-box">
    рҹҸ  мқҙлІҲ мЈјл¬ёмңјлЎң <strong id="donationAmt">0мӣҗ</strong>мқҙ<br>мң кё°кІ¬ ліҙнҳёмҶҢм—җ кё°л¶Җлҗҗм–ҙмҡ”!
  </div>
  <button class="btn-home" onclick="location.href='/'">нҷҲмңјлЎң</button>
  <button class="btn-shop" onclick="location.href='shop.html'">кі„мҶҚ мҮјн•‘н•ҳкё°</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://pzzunxgbzkhdqemmgavd.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6enVueGdiemtoZHFlbW1nYXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTU5NTAsImV4cCI6MjA4OTA3MTk1MH0.Rswsnz9WU5L7hzLD82iupeuizj-GnE4OJl42-QUv030';
const _supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function init(){
  const params=new URLSearchParams(window.location.search);
  // нҸ¬нҠёмӣҗ V2: paymentIdлЎң лҰ¬лӢӨмқҙл үнҠёлҗЁ
  const paymentId=params.get('paymentId')||params.get('orderId')||'';

  document.getElementById('orderId').textContent=paymentId;

  // localStorageм—җм„ң мЈјл¬ё м •ліҙ к°Җм ёмҳӨкё°
  const pending=JSON.parse(localStorage.getItem('pendingOrder')||'{}');

  if(pending.items){
    document.getElementById('orderName').textContent=pending.items.length===1?pending.items[0].name:`${pending.items[0].name} мҷё ${pending.items.length-1}кұҙ`;
    document.getElementById('orderAddress').textContent=(pending.address||'')+' '+(pending.addressDetail||'');
    document.getElementById('orderAmount').textContent=Number(pending.amount||0).toLocaleString()+'мӣҗ';

    // кё°л¶ҖкёҲ кі„мӮ°
    const totalDon=pending.items.reduce((sum,item)=>(sum+Math.floor((item.price||0)*0.03)*(item.qty||1)),0);
    document.getElementById('donationAmt').textContent=Number(totalDon).toLocaleString()+'мӣҗ';

    // Supabaseм—җ мЈјл¬ё м ҖмһҘ
    const {data:{session}} = await _supabase.auth.getSession();
    const userId = session?.user?.id || null;
    const userEmail = session?.user?.email || pending.email || '';

    for(const item of pending.items){
      const {error: orderErr} = await _supabase.from('orders').insert({
        user_id: userId,
        customer_name: pending.name,
        customer_email: userEmail,
        customer_phone: pending.phone,
        zipcode: pending.zipcode,
        address: pending.address,
        address_detail: pending.addressDetail,
        product_name: item.name,
        amount: item.price*(item.qty||1),
        status: 'кІ°м ңмҷ„лЈҢ',
        payment_id: params.get('paymentId')||'',
      });
      if(orderErr) console.error('мЈјл¬ё м ҖмһҘ мҳӨлҘҳ:', orderErr);
    }

    // л°°мҶЎ мЈјмҶҢлҘј profilesм—җлҸ„ м ҖмһҘ (лӢӨмқҢ мЈјл¬ё мһҗлҸҷ мһ…л Ҙмҡ©)
    if(userId){
      await _supabase.from('profiles').upsert({
        user_id: userId,
        name: pending.name,
        phone: pending.phone,
        zipcode: pending.zipcode,
        address: pending.address,
        address_detail: pending.addressDetail,
        ...(pending.discount_applied ? {first_order_used: true} : {}),
      },{onConflict:'user_id'});
    }

    // мһҘл°”кө¬лӢҲ & мһ„мӢң мЈјл¬ё м •ліҙ мӮӯм ң
    localStorage.removeItem('cart');
    localStorage.removeItem('pendingOrder');
  }
}

init();
</script>
</body>
</html>
