<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>카드뉴스 자동생성기 — Wellipet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
:root{
  --pk:#c45c8a;--pkm:#e07aaa;--pkl:#f2aecb;--pkp:#fce8f2;--pkbg:#fff5f9;
  --tx:#2a1a22;--muted:#a08090;--bd:#f0d8e6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--pkbg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
header{background:#fff;border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;align-items:center;gap:12px}
header .logo{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:var(--pk)}
header h1{font-size:16px;font-weight:700;color:var(--tx)}
.container{max-width:900px;margin:0 auto;padding:32px 20px}

/* 설정 카드 */
.setup-card{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:28px;margin-bottom:24px}
.setup-card h2{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--pk)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.single{grid-template-columns:1fr}
label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px}
input,textarea,select{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;font-family:inherit;color:var(--tx);background:#fff;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--pk)}
textarea{resize:vertical;min-height:80px}
.hint{font-size:12px;color:var(--muted);margin-top:4px}

/* 색상 팔레트 */
.palette{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.swatch{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.swatch.active{border-color:var(--pk);transform:scale(1.1)}
.swatch:hover{transform:scale(1.05)}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--pk);color:#fff}
.btn-primary:hover{background:var(--pkm)}
.btn-primary:disabled{background:var(--pkl);cursor:not-allowed}
.btn-secondary{background:var(--pkp);color:var(--pk)}
.btn-secondary:hover{background:var(--pkl);color:#fff}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}

/* 진행 상태 */
.progress-wrap{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:24px;margin-bottom:24px;display:none}
.progress-wrap.visible{display:block}
.progress-steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:var(--pkbg);font-size:14px}
.step.done{background:#f0fdf4;color:#15803d}
.step.active{background:var(--pkp);color:var(--pk)}
.step.error{background:#fef2f2;color:#dc2626}
.step-icon{font-size:18px;width:24px;text-align:center}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--pkl);border-top-color:var(--pk);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 결과 그리드 */
.result-wrap{display:none}
.result-wrap.visible{display:block}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.result-header h2{font-size:18px;font-weight:700;color:var(--pk)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-bottom:24px}
.card-item{background:#fff;border:1px solid var(--bd);border-radius:14px;overflow:hidden;text-align:center}
.card-item canvas{display:block;width:100%;height:auto}
.card-item .card-footer{padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.card-item .card-num{font-size:12px;color:var(--muted);font-weight:700}
.card-item .btn-dl{font-size:12px;padding:6px 12px}

/* 에러 */
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px 16px;color:#dc2626;font-size:14px;margin-top:12px;display:none}
.error-box.visible{display:block}

@media(max-width:600px){
  .form-row{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <span class="logo">Wellipet</span>
  <h1>카드뉴스 자동생성기</h1>
</header>

<div class="container">

  <!-- 설정 -->
  <div class="setup-card">
    <h2>카드뉴스 설정</h2>

    <div class="form-row single">
      <div>
        <label>주제 *</label>
        <input type="text" id="topic" placeholder="예: 강아지 건강 관리 5가지 팁" maxlength="100">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>카드 수</label>
        <select id="cardCount">
          <option value="5">5장</option>
          <option value="6">6장</option>
          <option value="7" selected>7장</option>
        </select>
      </div>
      <div>
        <label>배경 스타일</label>
        <select id="bgStyle">
          <option value="ai">AI 이미지 생성 (Fal.ai)</option>
          <option value="solid">단색 배경</option>
        </select>
      </div>
    </div>

    <div id="solidColorRow">
      <label>배경색</label>
      <div class="palette" id="palette">
        <div class="swatch active" style="background:#f5f3ee" data-color="#f5f3ee" title="베이지"></div>
        <div class="swatch" style="background:#fce8f2" data-color="#fce8f2" title="핑크"></div>
        <div class="swatch" style="background:#e0f4f1" data-color="#e0f4f1" title="민트"></div>
        <div class="swatch" style="background:#e8e0f5" data-color="#e8e0f5" title="라벤더"></div>
        <div class="swatch" style="background:#ffe8d6" data-color="#ffe8d6" title="피치"></div>
        <div class="swatch" style="background:#e3f2fd" data-color="#e3f2fd" title="스카이블루"></div>
        <div class="swatch" style="background:#1a1a2e" data-color="#1a1a2e" title="다크네이비"></div>
        <div class="swatch" style="background:#2d2d2d" data-color="#2d2d2d" title="다크그레이"></div>
      </div>
    </div>

    <div id="aiStyleRow" style="display:none">
      <label>이미지 스타일 프롬프트 (선택)</label>
      <input type="text" id="imgStyle" placeholder="예: soft watercolor, pastel, minimalist flat illustration">
      <p class="hint">비워두면 주제에 맞게 자동 생성됩니다.</p>
    </div>

    <div id="overlayRow" style="display:none;margin-top:16px">
      <label>오버레이 불투명도: <span id="overlayVal">0.5</span></label>
      <input type="range" id="overlay" min="0.1" max="0.9" step="0.1" value="0.5" style="padding:0">
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="btn-row" style="margin-top:24px">
      <button class="btn btn-primary" id="generateBtn" onclick="startGenerate()">
        <span>✨</span> 카드뉴스 생성
      </button>
    </div>
  </div>

  <!-- 진행 상태 -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-steps" id="progressSteps"></div>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-header">
      <h2 id="resultTitle">생성된 카드뉴스</h2>
      <button class="btn btn-secondary" onclick="downloadAll()">전체 다운로드</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>

<script>
// ─── API 설정 ────────────────────────────────────────────
const OPENROUTER_API_KEY = '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';
const OPENROUTER_MODELS = [
  'nvidia/nemotron-3-nano-30b-a3b:free',
  'meta-llama/llama-3.3-70b-instruct:free',
  'mistralai/mistral-small-3.1-24b-instruct:free',
];
const FAL_KEY            = '6dc77996-6bf6-4dec-a9ad-baa3a2eb64ac:30ed71b33e0fc2ceb3b16e093e3ac3cb';

// ─── 상태 ────────────────────────────────────────────────
let selectedColor = '#f5f3ee';
let generatedCards = []; // { canvas, title }

// ─── UI 초기화 ───────────────────────────────────────────
document.getElementById('bgStyle').addEventListener('change', function() {
  const isAI = this.value === 'ai';
  document.getElementById('aiStyleRow').style.display   = isAI ? '' : 'none';
  document.getElementById('overlayRow').style.display   = isAI ? '' : 'none';
  document.getElementById('solidColorRow').style.display = isAI ? 'none' : '';
});

document.getElementById('overlay').addEventListener('input', function() {
  document.getElementById('overlayVal').textContent = this.value;
});

document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', function() {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    selectedColor = this.dataset.color;
  });
});

// ─── 메인 생성 플로우 ────────────────────────────────────
async function startGenerate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { showError('주제를 입력해주세요.'); return; }

  hideError();
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('resultWrap').classList.remove('visible');
  generatedCards = [];

  showProgress();
  const steps = document.getElementById('progressSteps');

  try {
    // Step 1: 콘텐츠 생성
    setStep(steps, 0, 'active', '📝', 'AI로 카드 내용 생성 중...');
    const cards = await generateContent(topic);
    setStep(steps, 0, 'done', '✅', `카드 내용 ${cards.length}장 생성 완료`);

    // Step 2: 이미지 또는 색상
    const bgStyle = document.getElementById('bgStyle').value;
    let bgList = [];

    if (bgStyle === 'ai') {
      setStep(steps, 1, 'active', '🎨', 'Fal.ai로 배경 이미지 생성 중...');
      bgList = await generateImages(cards, topic);
      setStep(steps, 1, 'done', '✅', `배경 이미지 ${bgList.length}장 생성 완료`);
    } else {
      setStep(steps, 1, 'done', '✅', '단색 배경 적용');
      bgList = new Array(cards.length).fill(null);
    }

    // Step 3: 카드 렌더링
    setStep(steps, 2, 'active', '🖼️', '카드 이미지 렌더링 중...');
    const overlay = parseFloat(document.getElementById('overlay').value);
    await renderCards(cards, bgList, overlay);
    setStep(steps, 2, 'done', '✅', '카드 렌더링 완료');

    showResults(topic);

  } catch (e) {
    const lastStep = document.querySelector('.step.active');
    if (lastStep) lastStep.className = 'step error';
    showError('오류: ' + (e.message || e));
    console.error(e);
  } finally {
    document.getElementById('generateBtn').disabled = false;
  }
}

// ─── Step 1: OpenRouter로 카드 내용 생성 ─────────────────
async function generateContent(topic) {
  const count = parseInt(document.getElementById('cardCount').value);

  const prompt = `You are a Korean SNS card news writer. RESPOND ONLY IN KOREAN. DO NOT USE Chinese or Japanese characters.

Topic: "${topic}"
Create ${count} cards.

Rules:
- ALL text must be in Korean (한국어)
- Title: max 15 Korean characters
- Lines: 2~3 lines, max 18 Korean characters each
- First card: cover/intro
- Last card: closing/CTA
- Return ONLY a JSON array, no markdown

Format:
[
  {"title":"제목","lines":["첫째줄","둘째줄","셋째줄"]},
  ...
]`;

  let lastError = null;
  for (const model of OPENROUTER_MODELS) {
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': location.origin,
          'X-Title': 'Wellipet Card News Generator'
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7,
          max_tokens: 1200
        })
      });

      if (res.status === 429 || res.status === 404) {
        lastError = `${model} 한도 초과 또는 없음`;
        continue; // 다음 모델 시도
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        lastError = `${model} 오류: ${res.status}`;
        continue;
      }

      const data = await res.json();
      let raw = data.choices[0].message.content.trim();
      raw = raw.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
      return JSON.parse(raw);

    } catch (e) {
      lastError = e.message;
      continue;
    }
  }

  throw new Error(`모든 모델 실패: ${lastError}`);
}

// ─── Step 2: Fal.ai로 배경 이미지 생성 ───────────────────
async function generateImages(cards, mainTopic) {
  const styleHint = document.getElementById('imgStyle')?.value.trim() ||
    'soft pastel illustration, minimal, clean background, instagram card style';

  const tasks = cards.map(card => {
    // 텍스트/기호가 생성되는 것을 강력히 방지 (Flux 모델 특성 고려)
    const prompt = `A clean background illustration representing "${card.title}" (Context: ${mainTopic}). ${styleHint}. IMPORTANT: Ensure a completely blank background space. ABSOLUTELY NO TEXT, NO WORDS, NO LETTERS, NO TYPOGRAPHY, NO CHARACTERS, AND NO WATERMARKS anywhere in the image.`;
    return generateOneImage(prompt);
  });
  
  const results = await Promise.all(tasks);
  return results; // HTMLImageElement[]
}

async function generateOneImage(prompt) {
  const res = await fetch('https://fal.run/fal-ai/flux/schnell', {
    method: 'POST',
    headers: {
      'Authorization': `Key ${FAL_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      prompt,
      image_size: 'square_hd',
      num_inference_steps: 4,
      num_images: 1
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`Fal.ai 오류: ${res.status} ${JSON.stringify(err)}`);
  }

  const data = await res.json();
  const url = data.images?.[0]?.url;
  if (!url) throw new Error('Fal.ai 이미지 URL 없음');

  return await loadImage(url);
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('이미지 로드 실패: ' + url));
    img.src = url;
  });
}

// ─── Step 3: Canvas 렌더링 ────────────────────────────────
async function renderCards(cards, bgList, overlayOpacity) {
  generatedCards = [];
  const isDark = bgList.some(b => b !== null);

  for (let i = 0; i < cards.length; i++) {
    const card = cards[i];
    const bg   = bgList[i];
    const canvas = document.createElement('canvas');
    canvas.width  = 600;
    canvas.height = 600;
    const ctx = canvas.getContext('2d');

    // 배경
    if (bg) {
      // 이미지 배경 — center crop
      const scale = Math.max(600 / bg.width, 600 / bg.height);
      const sw = 600 / scale, sh = 600 / scale;
      const sx = (bg.width  - sw) / 2;
      const sy = (bg.height - sh) / 2;
      ctx.drawImage(bg, sx, sy, sw, sh, 0, 0, 600, 600);

      // 다크 오버레이
      ctx.fillStyle = `rgba(0,0,0,${overlayOpacity})`;
      ctx.fillRect(0, 0, 600, 600);
    } else {
      ctx.fillStyle = selectedColor;
      ctx.fillRect(0, 0, 600, 600);
    }

    const isLight = !bg && isLightColor(selectedColor);
    const textColor  = (bg || !isLight) ? '#ffffff' : '#1a1a1a';
    const accentColor = (bg || !isLight) ? 'rgba(255,255,255,0.9)' : '#c45c8a';
    const mutedColor  = (bg || !isLight) ? 'rgba(255,255,255,0.65)' : '#a08090';

    // 카드 번호 뱃지
    ctx.save();
    ctx.fillStyle = accentColor;
    ctx.font = 'bold 22px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'left';
    const numText = `0${i+1}`;
    ctx.fillText(numText, 44, 80);

    // 뱃지 구분선
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(44, 90);
    ctx.lineTo(44 + ctx.measureText(numText).width, 90);
    ctx.stroke();
    ctx.restore();

    // 제목
    ctx.save();
    ctx.fillStyle = textColor;
    ctx.font = 'bold 52px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    wrapText(ctx, card.title, 300, 260, 520, 62);
    ctx.restore();

    // 구분선
    ctx.save();
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(120, 340);
    ctx.lineTo(480, 340);
    ctx.stroke();
    ctx.restore();

    // 내용
    ctx.save();
    ctx.fillStyle = mutedColor;
    ctx.font = '28px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    const lines = card.lines || [];
    const lineH = 42;
    const totalH = lines.length * lineH;
    let startY = 390 + (160 - totalH) / 2;
    lines.forEach(line => {
      ctx.fillText(line, 300, startY);
      startY += lineH;
    });
    ctx.restore();

    // 브랜드 워터마크
    ctx.save();
    ctx.fillStyle = mutedColor;
    ctx.globalAlpha = 0.5;
    ctx.font = '16px "Nunito", "Noto Sans KR", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('wellipet', 556, 566);
    ctx.restore();

    generatedCards.push({ canvas, title: card.title });
  }
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const chars = Array.from(text || ''); // 이모지 깨짐 방지
  let line = '';
  let lines = [];
  for (let c of chars) {
    const test = line + c;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = c;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  const totalH = lines.length * lineH;
  lines.forEach((l, i) => ctx.fillText(l, x, y - totalH/2 + i*lineH + lineH*0.4));
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128;
}

// ─── 결과 표시 ────────────────────────────────────────────
function showResults(topic) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  generatedCards.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'card-item';
    div.appendChild(item.canvas);

    const footer = document.createElement('div');
    footer.className = 'card-footer';
    footer.innerHTML = `<span class="card-num">Card ${String(i+1).padStart(2,'0')}</span>`;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-secondary btn-sm card-dl-btn';
    dlBtn.textContent = '⬇ 저장';
    dlBtn.onclick = () => downloadCard(item.canvas, i+1, topic);
    footer.appendChild(dlBtn);

    div.appendChild(footer);
    grid.appendChild(div);
  });

  document.getElementById('resultTitle').textContent = `"${topic}" 카드뉴스 ${generatedCards.length}장`;
  document.getElementById('resultWrap').classList.add('visible');
  document.getElementById('resultWrap').scrollIntoView({behavior:'smooth'});
}

// ─── 다운로드 ─────────────────────────────────────────────
function downloadCard(canvas, num, topic) {
  const a = document.createElement('a');
  const safeTopic = topic.replace(/[^\w가-힣]/g, '_').slice(0,20);
  a.download = `${safeTopic}_${String(num).padStart(2,'0')}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  const topic = document.getElementById('topic').value.trim();
  generatedCards.forEach((item, i) => {
    setTimeout(() => downloadCard(item.canvas, i+1, topic), i * 300);
  });
}

// ─── Progress UI ──────────────────────────────────────────
function showProgress() {
  const wrap = document.getElementById('progressWrap');
  const steps = document.getElementById('progressSteps');
  wrap.classList.add('visible');
  steps.innerHTML = `
    <div class="step" id="s0"><span class="step-icon">⏳</span> 카드 내용 생성 대기 중...</div>
    <div class="step" id="s1"><span class="step-icon">⏳</span> 배경 이미지 대기 중...</div>
    <div class="step" id="s2"><span class="step-icon">⏳</span> 카드 렌더링 대기 중...</div>
  `;
}

function setStep(container, idx, state, icon, text) {
  const el = document.getElementById('s' + idx);
  if (!el) return;
  const iconEl = state === 'active'
    ? `<span class="spinner"></span>`
    : `<span class="step-icon">${icon}</span>`;
  el.className = `step ${state}`;
  el.innerHTML = `${iconEl} ${text}`;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}
</script>
</body>
</html>
