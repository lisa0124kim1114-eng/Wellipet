<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>주문하기 · Wellypet</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://js.tosspayments.com/v2/standard"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pk:#c45c8a;--pkm:#e07aaa;--pkl:#f2aecb;--pkp:#fce8f2;--pkbg:#fff5f9;--bd:#f0d8e6;--tx:#2a1a22;--muted:#a08090;}
body{font-family:'Pretendard',sans-serif;background:#f8f8f8;color:var(--tx);}

header{background:#fff;border-bottom:1px solid var(--bd);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:22px;font-weight:800;color:var(--pk);cursor:pointer;text-decoration:none;}
.logo em{font-style:normal;color:var(--pkm);}
.back-btn{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;}

.container{max-width:900px;margin:32px auto;padding:0 20px;display:grid;grid-template-columns:1.2fr 1fr;gap:24px;}

.section{background:#fff;border-radius:16px;padding:28px;border:1px solid var(--bd);}
.section-title{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--bd);}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}
.form-group input{width:100%;padding:11px 14px;border:1px solid var(--bd);border-radius:10px;font-size:14px;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .2s;color:var(--tx);}
.form-group input:focus{border-color:var(--pk);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.product-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd);}
.product-item:last-child{border-bottom:none;}
.product-img{width:56px;height:56px;border-radius:10px;background:var(--pkp);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.product-info{flex:1;}
.product-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px;}
.product-option{font-size:11px;color:var(--muted);}
.product-price{font-size:15px;font-weight:700;color:var(--pk);}

.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.summary-row .label{font-size:13px;color:var(--muted);}
.summary-row .value{font-size:13px;color:var(--tx);font-weight:500;}
.summary-row.total{margin-top:14px;padding-top:14px;border-top:1px solid var(--bd);}
.summary-row.total .label{font-size:15px;font-weight:700;color:var(--tx);}
.summary-row.total .value{font-size:20px;font-weight:800;color:var(--pk);}

.donation-notice{background:var(--pkbg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin:16px 0;display:flex;align-items:center;gap:10px;}
.donation-notice .icon{font-size:16px;}
.donation-notice .text{font-size:12px;color:var(--pk);font-weight:500;}

.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.pay-method{border:1.5px solid var(--bd);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;}
.pay-method.active{border-color:var(--pk);background:var(--pkp);}
.pay-method .pm-icon{font-size:20px;margin-bottom:4px;}
.pay-method .pm-name{font-size:11px;color:var(--tx);font-weight:500;}

.btn-pay{width:100%;background:var(--pk);color:#fff;border:none;padding:16px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:background .2s;margin-top:8px;}
.btn-pay:hover{background:#b04a7a;}
.btn-pay:disabled{background:#ddd;cursor:not-allowed;}

.safe-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;}
.safe-badge span{font-size:11px;color:#bbb;}

#payment-widget{margin-bottom:16px;}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Welly<em>pet</em></a>
  <a class="back-btn" href="index.html">← 쇼핑 계속하기</a>
</header>

<div class="container">
  <div>
    <!-- 배송 정보 -->
    <div class="section" style="margin-bottom:20px;">
      <div class="section-title">배송 정보</div>
      <div class="form-group">
        <label>받는 분</label>
        <input type="text" id="customerName" placeholder="홍길동"/>
      </div>
      <div class="form-group">
        <label>연락처</label>
        <input type="tel" id="customerPhone" placeholder="010-0000-0000"/>
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="customerEmail" placeholder="hello@wellypet.co.kr"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>우편번호</label>
          <input type="text" placeholder="12345"/>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <input type="button" value="주소 검색" style="background:var(--pkbg);border:1px solid var(--bd);border-radius:10px;padding:11px;cursor:pointer;font-family:Pretendard,sans-serif;font-size:13px;color:var(--pk);width:100%;"/>
        </div>
      </div>
      <div class="form-group">
        <label>주소</label>
        <input type="text" placeholder="기본 주소"/>
      </div>
      <div class="form-group">
        <label>상세 주소</label>
        <input type="text" placeholder="상세 주소 입력"/>
      </div>
    </div>

    <!-- 결제 수단 -->
    <div class="section">
      <div class="section-title">결제 수단</div>
      <div class="pay-methods">
        <div class="pay-method active" onclick="selectMethod(this,'카드')">
          <div class="pm-icon">💳</div>
          <div class="pm-name">신용/체크카드</div>
        </div>
        <div class="pay-method" onclick="selectMethod(this,'카카오페이')">
          <div class="pm-icon">💛</div>
          <div class="pm-name">카카오페이</div>
        </div>
        <div class="pay-method" onclick="selectMethod(this,'네이버페이')">
          <div class="pm-icon">🟢</div>
          <div class="pm-name">네이버페이</div>
        </div>
        <div class="pay-method" onclick="selectMethod(this,'토스페이')">
          <div class="pm-icon">🔵</div>
          <div class="pm-name">토스페이</div>
        </div>
      </div>
      <button class="btn-pay" onclick="requestPayment()">18,900원 결제하기</button>
      <div class="safe-badge">
        <span>🔒 SSL 보안 결제 · 개인정보 안전 보호</span>
      </div>
    </div>
  </div>

  <div>
    <!-- 주문 상품 -->
    <div class="section" style="margin-bottom:20px;">
      <div class="section-title">주문 상품</div>
      <div class="product-item">
        <div class="product-img">🧻</div>
        <div class="product-info">
          <div class="product-name">웰리펫 순면 배변패드 50매</div>
          <div class="product-option">수량 1개</div>
        </div>
        <div class="product-price">18,900원</div>
      </div>
    </div>

    <!-- 결제 금액 -->
    <div class="section">
      <div class="section-title">결제 금액</div>
      <div class="summary-row">
        <span class="label">상품 금액</span>
        <span class="value">18,900원</span>
      </div>
      <div class="summary-row">
        <span class="label">배송비</span>
        <span class="value" style="color:#2a7a5a;">무료</span>
      </div>
      <div class="summary-row">
        <span class="label">할인</span>
        <span class="value" style="color:var(--pk);">-0원</span>
      </div>
      <div class="donation-notice">
        <span class="icon">🏠</span>
        <span class="text">이 주문으로 567원이 유기견 보호소에 기부돼요</span>
      </div>
      <div class="summary-row total">
        <span class="label">최종 결제금액</span>
        <span class="value">18,900원</span>
      </div>
    </div>
  </div>
</div>

<script>
const clientKey = 'test_ck_6BYq7GWPVvx4N9za6O6l8NE5vbo1';
let selectedMethod = '카드';

function selectMethod(el, method) {
  document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
  selectedMethod = method;
}

async function requestPayment() {
  const customerName = document.getElementById('customerName').value;
  const customerEmail = document.getElementById('customerEmail').value;
  const customerPhone = document.getElementById('customerPhone').value;

  if (!customerName || !customerEmail || !customerPhone) {
    alert('배송 정보를 모두 입력해주세요.');
    return;
  }

  const tossPayments = TossPayments(clientKey);
  const orderId = 'order-' + Date.now();

  try {
    await tossPayments.requestPayment({
      method: selectedMethod === '카드' ? 'CARD' :
              selectedMethod === '카카오페이' ? 'EASY_PAY' :
              selectedMethod === '네이버페이' ? 'EASY_PAY' : 'EASY_PAY',
      amount: {
        currency: 'KRW',
        value: 18900,
      },
      orderId: orderId,
      orderName: '웰리펫 순면 배변패드 50매',
      customerName: customerName,
      customerEmail: customerEmail,
      customerMobilePhone: customerPhone.replace(/-/g, ''),
      successUrl: window.location.origin + '/success.html',
      failUrl: window.location.origin + '/fail.html',
      easyPay: selectedMethod !== '카드' ? {
        easyPayType: selectedMethod === '카카오페이' ? 'KAKAOPAY' :
                     selectedMethod === '네이버페이' ? 'NAVERPAY' : 'TOSSPAY'
      } : undefined,
    });
  } catch (error) {
    if (error.code !== 'USER_CANCEL') {
      alert('결제 중 오류가 발생했어요: ' + error.message);
    }
  }
}
</script>
</body>
</html>
